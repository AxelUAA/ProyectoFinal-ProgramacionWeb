<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - SNEAKERCLON5G</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner container">
      <div class="logo-area">
        <img src="img/logo.jpg" alt="Logo">
        <h1>SNEAKERCLON5G</h1>
      </div>

      <nav>
        <a href="index.html">Inicio</a>
        <div class="dropdown">
          <button class="dropdown-btn">Categorías ▾</button>
          <div class="dropdown-content">
            <a href="hombre.html">Hombre</a>
            <a href="mujer.html">Mujer</a>
            <a href="ninos.html">Niños</a>
          </div>
        </div>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contáctanos</a>
        <a href="faq.html">Preguntas frecuentes</a>
      </nav>

      <div class="user-area" id="user-area"></div>
    </div>
  </header>

  <!-- LOGIN -->
  <main class="container">
    <div class="login-wrapper">
      <h2>Iniciar sesión</h2>
      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="tu@correo.com" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="********" required>

        <button type="submit">Entrar</button>

        <!-- Cambiar contraseña con SweetAlert -->
        <button type="button" class="btn-secundario" onclick="Swal.fire({
          icon: 'info',
          title: 'Próximamente',
          text: 'Esta función aún no está disponible.'
        })">
          Cambiar contraseña
        </button>

        <!-- Registrar -->
        <button type="button" class="btn-secundario" onclick="window.location.href='registrar.html'">
          Registrar
        </button>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-columns">
        <div class="footer-col">
          <h4>Acerca de</h4>
          <ul>
            <li><a href="nosotros.html">Nuestra historia</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="faq.html">Ayuda</a></li>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        © 2025 SNEAKERCLON5G. Proyecto de Programación Web.
      </div>
    </div>
  </footer>

  <script src="js/auth.js"></script>

  <!-- SCRIPT DE LOGIN CON SWEETALERT -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const correo = document.getElementById('correo').value.trim();
        const password = document.getElementById('password').value.trim();

        try {
          const res = await fetch('http://localhost:3000/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correo, password })
          });

          const data = await res.json();

          if (!data.ok) {
            Swal.fire({
              icon: 'error',
              title: 'Credenciales incorrectas',
              text: data.msg
            });
            return;
          }

          // Guardamos usuario real en localStorage
          localStorage.setItem('currentUserName', data.nombre);
          localStorage.setItem('currentUserEmail', data.correo);
          localStorage.setItem('currentUserRol', data.rol);

          Swal.fire({
            icon: 'success',
            title: 'Bienvenido',
            text: 'Inicio de sesión exitoso',
            timer: 1500,
            showConfirmButton: false
          }).then(() => {
            window.location.href = 'index.html';
          });

        } catch (error) {
          Swal.fire({
            icon: 'error',
            title: 'Servidor apagado',
            text: 'No se pudo conectar al backend.'
          });
        }
      });
    });
  </script>

  <!-- ACCESIBILIDAD -->
  <div id="accesibilidad-btn">☰</div>

  <div id="accesibilidad-panel">
    <h3>Accesibilidad</h3>

    <label>Tamaño de letra:</label>
    <select id="acc-font-size">
        <option value="small">Pequeña</option>
        <option value="medium">Normal</option>
        <option value="large">Grande</option>
        <option value="xlarge">Extra grande</option>
    </select>

    <label>Contraste:</label>
    <select id="acc-contrast">
        <option value="light">Claro</option>
        <option value="dark">Oscuro</option>
    </select>

    <label>Tipo de letra:</label>
    <select id="acc-font-family">
        <option value="arial">Arial</option>
        <option value="serif">Serif</option>
        <option value="dyslexic">OpenDyslexic</option>
    </select>

    <button id="acc-save">Guardar Preferencias</button>
  </div>

  <script src="js/accesibilidad.js"></script>

</body>
</html>
