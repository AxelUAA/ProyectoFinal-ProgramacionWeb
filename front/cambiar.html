<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Acceso - SNEAKERCLON5G</title>
  <link rel="stylesheet" href="css/cambiar.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<body>

  <main class="container">
    <div class="login-wrapper">
      <h2>Recuperar Contraseña</h2>

      <form id="changePassForm">

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="tu@correo.com" required>

        <button type="submit">Enviar enlace de recuperación</button>

        <button type="button" class="btn-secundario" onclick="window.location.href='login.html'">
          ← Volver al login
        </button>

      </form>

      <div class="help-text">
        <p>📧 Te enviaremos un enlace para restablecer tu contraseña a tu correo electrónico.</p>
      </div>
    </div>
  </main>

  <script src="js/recuperarAcceso.js"></script>

</body>
</html>
