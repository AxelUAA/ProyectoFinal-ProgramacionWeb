<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Acceso</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<body>

  <main class="container">
    <div class="login-wrapper">
      <h2>Recuperar acceso</h2>

      <form id="changePassForm">

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="tu@correo.com" required>

        <button type="submit">Enviar enlace de recuperación</button>

        <button type="button" class="btn-secundario" onclick="window.location.href='login.html'">
          Volver al login
        </button>

      </form>
    </div>
  </main>

  <script src="js/recuperarAcceso.js"></script>

  <script>
  document.getElementById("btnVerCarrito").addEventListener("click", () => {
    window.location.href = "pagar.html";
  });
</script>
</body>
</html>
