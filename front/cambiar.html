<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Contraseña</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="container">
    <div class="login-wrapper">
      <h2>Cambiar contraseña</h2>

      <form id="changePassForm">

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="tu@correo.com" required>

        <label for="passwordNueva">Nueva contraseña</label>
        <input type="password" id="passwordNueva" placeholder="********" required>

        <label for="passwordNueva2">Confirmar nueva contraseña</label>
        <input type="password" id="passwordNueva2" placeholder="********" required>

        <button type="submit">Actualizar contraseña</button>
        <button type="button" class="btn-secundario" onclick="window.location.href='login.html'">
          Volver al login
        </button>

      </form>
    </div>
  </main>

</body>
</html>
