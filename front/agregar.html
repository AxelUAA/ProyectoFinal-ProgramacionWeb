<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Producto</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h2 class="page-title">Agregar Producto</h2>

<div class="form-container">
  <form>
    <label>ID:</label>
    <input type="number">

    <label>Nombre:</label>
    <input type="text">

    <label>Descripción:</label>
    <textarea></textarea>

    <label>Precio:</label>
    <input type="number">

    <label>Stock:</label>
    <input type="number">

    <label>Imagen (nombre archivo):</label>
    <input type="text">

    <label>Categoría (1,2,3):</label>
    <input type="number">

    <button type="button">Guardar (pendiente backend)</button>
  </form>
</div>

</body>
</html>
