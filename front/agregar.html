<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Producto</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>

<h2 class="page-title">Agregar Producto</h2>

<div class="form-container">
  <form id="formAgregar">
    <label>ID:</label>
    <input type="number" name="id">

    <label>Nombre:</label>
    <input type="text" name="nombre">

    <label>Descripción:</label>
    <textarea name="descripcion"></textarea>

    <label>Precio:</label>
    <input type="number" name="precio">

    <label>Stock:</label>
    <input type="number" name="stock">

    <label>Imagen (nombre archivo):</label>
    <input type="text" name="imagen">

    <label>Categoría (1,2,3):</label>
    <input type="number" name="categoria">

    <button type="Submit">Guardar Producto</button>
    <button type="button" id="back">Regresar</button>
  </form>
</div>
<script>
  document.getElementById("btnVerCarrito").addEventListener("click", () => {
    window.location.href = "pagar.html";
  });
</script>
</body>
<script src="js/agregar.js"></script>

</html>
