<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Productos</title>
    <style>
        /* Un poco de CSS básico para que no se vea feo */
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        h1 { text-align: center; color: #333; }
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 200px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain; /* Para que la imagen no se deforme */
            margin-bottom: 10px;
        }
        .precio { color: green; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>Mis Productos (Prueba de DB e Imágenes)</h1>
    <div id="contenedor" class="grid-container">
        </div>

    <script>
        // Al cargar la página, pedimos los datos
        document.addEventListener('DOMContentLoaded', () => {
            fetch('http://localhost:3000/api/productos')
                .then(res => res.json())
                .then(data => {
                    const contenedor = document.getElementById('contenedor');
                    
                    // Si no hay datos o hubo error
                    if(data.length === 0) {
                        contenedor.innerHTML = '<p>No se encontraron productos.</p>';
                        return;
                    }

                    // Recorremos cada producto y creamos su HTML
                    data.forEach(producto => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        
                        // NOTA IMPORTANTE:
                        // Como declaramos 'front' como estático en server.js,
                        // la ruta '/img/' busca directamente en 'front/img/'
                        div.innerHTML = `
                            <img src="img/${producto.imagen}" alt="${producto.nombre}" onerror="this.src='https://via.placeholder.com/150?text=No+Imagen'">
                            <h3>${producto.nombre}</h3>
                            <p class="precio">$${producto.precio}</p>
                            <p>Stock: ${producto.stock}</p>
                        `;
                        
                        contenedor.appendChild(div);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('contenedor').innerHTML = '<p style="color:red">Error al cargar productos. Revisa la consola.</p>';
                });
        });
    </script>
</body>
</html>
