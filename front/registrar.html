<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar - SNEAKERCLON5G</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="header-inner container">
      <div class="logo-area">
        <img src="http://localhost:3000/public/img/logo.jpg" alt="Logo">
        <h1>SNEAKERCLON5G</h1>
      </div>

      <nav>
        <a href="index.html">Inicio</a>
        <div class="dropdown">
          <button class="dropdown-btn">Categorías ▾</button>
          <div class="dropdown-content">
            <a href="hombre.html">Hombre</a>
            <a href="mujer.html">Mujer</a>
            <a href="ninos.html">Niños</a>
          </div>
        </div>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contáctanos</a>
        <a href="faq.html">Preguntas frecuentes</a>
      </nav>
      <div class="user-area"></div>
    </div>
  </header>

  <main class="container">
    <div class="login-wrapper">
      <h2>Registrar nuevo usuario</h2>

      <form id="registerForm">
        
        <label for="id">ID</label>
        <input type="number" id="id" placeholder="Ejemplo: 1" required>

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre completo" required>

        <label for="correo">Correo</label>
        <input type="email" id="correo" placeholder="tu@correo.com" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="********" required>

         <label for="passwordNueva2">Confirmar contraseña</label>
        <input type="password" id="passwordNueva" placeholder="********" required>

        <button type="submit">Registrar</button>

        <button type="button" class="btn-secundario" onclick="window.location.href='login.html'">
          Volver al login
        </button>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-bottom">
        © 2025 SNEAKERCLON5G. Proyecto de Programación Web.
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/registrar.js"></script>
  <script>
  document.getElementById("btnVerCarrito").addEventListener("click", () => {
    window.location.href = "pagar.html";
  });
</script>
</body>
</html>
